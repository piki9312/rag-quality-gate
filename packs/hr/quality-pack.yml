# HR Quality Pack — 人事・労務 FAQ 向け品質パック
pack:
  name: hr-faq
  version: "1.0"
  domain: "人事・労務"
  description: >
    社内の就業規則・経費精算・勤怠・福利厚生に関する
    FAQ を対象とした品質パック。

cases_file: cases.csv
documents_dir: documents

# --- KPI 定義 ---
kpis:
  keyword_match_rate:
    description: "回答にドメイン固有キーワードが含まれる割合"
    target: 0.80
    weight: 0.4
  retrieval_hit_rate:
    description: "正しいチャンクが検索結果に含まれる割合"
    target: 0.85
    weight: 0.3
  reference_accuracy:
    description: "回答内の参照が実際の検索チャンクと一致する割合"
    target: 0.90
    weight: 0.2
  s1_pass_rate:
    description: "重大ケース (S1) の合格率"
    target: 1.00
    weight: 0.1

# --- SLO (Gate に使用) ---
slo:
  s1_pass_rate: 1.0
  overall_pass_rate: 0.85
  retrieval_precision_min: 0.70
  regression_tolerance: 0.05

# --- ROI メモ ---
roi:
  current_process: "問い合わせ → Slack で人事担当が手動回答 (平均 15 分/件)"
  expected_improvement: "回答の 70% を自動化 → 月 40 時間削減"
  cost_baseline_monthly_jpy: 200000
  target_payback_months: 3
