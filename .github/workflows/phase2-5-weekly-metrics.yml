name: Phase2.5 Weekly Hardening Metrics

on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  phase2-5-weekly-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Collect phase2.5 metrics
        id: collect
        continue-on-error: true
        run: |
          set +e
          python -m rqg.demo.phase2_5_weekly_metrics \
            --output runs/phase2-5-weekly/summary.json \
            --append-register \
            --reviewer "${GITHUB_ACTOR}"
          collector_exit_code=$?
          set -e
          echo "collector_exit_code=${collector_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Detect register changes
        id: register_diff
        run: |
          if git diff --quiet -- docs/ops/phase2-5-weekly-metrics-register.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request for weekly register update
        id: register_pr
        if: steps.register_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update phase2.5 weekly metrics register (run ${{ github.run_id }})"
          branch: automation/phase2-5-weekly-metrics-${{ github.run_id }}
          delete-branch: true
          title: "Phase2.5 weekly metrics update (run ${{ github.run_id }})"
          body: |
            Auto-generated update from Phase2.5 Weekly Hardening Metrics workflow.

            - run_id: ${{ github.run_id }}
            - run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - source summary: runs/phase2-5-weekly/summary.json

            This PR updates the weekly register with one row for this run.
          labels: |
            documentation
            automation
          add-paths: |
            docs/ops/phase2-5-weekly-metrics-register.md

      - name: No register update detected
        if: steps.register_diff.outputs.changed != 'true'
        run: echo "No register changes detected. Skipping PR creation."

      - name: Link weekly metrics run to weekly review issue
        id: link_weekly_metrics
        if: always()
        uses: actions/github-script@v7
        env:
          REGISTER_PR_URL: ${{ steps.register_pr.outputs.pull-request-url }}
        with:
          script: |
            const fs = require('fs');
            const runId = process.env.GITHUB_RUN_ID;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            const registerPrUrl = process.env.REGISTER_PR_URL || '';
            const { owner, repo } = context.repo;

            let summary = {};
            let weekStart = 'unknown';
            try {
              summary = JSON.parse(fs.readFileSync('runs/phase2-5-weekly/summary.json', 'utf8'));
              weekStart = summary.week_start || weekStart;
            } catch (error) {
              core.warning(`Failed to parse summary.json: ${error.message}`);
            }

            const weeklyTitle = `[Phase2.5][Weekly Review] ${weekStart}`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title "${weeklyTitle}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });

            if (existing.data.total_count === 0) {
              core.warning(`Weekly review issue not found for ${weekStart}. Skipping link comment.`);
              return '';
            }

            const issue = existing.data.items[0];
            const body = [
              'Phase2.5 weekly metrics run linked from automation.',
              '',
              `- week_start: ${summary.week_start ?? weekStart}`,
              `- run_id: ${summary.run_id ?? runId}`,
              `- run_url: ${summary.run_url ?? runUrl}`,
              `- decision: ${summary.decision ?? 'unknown'}`,
              `- register_pr: ${registerPrUrl || 'not created (no register diff)'}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });

            core.info(`Posted weekly metrics link comment to ${issue.html_url}`);
            return issue.html_url;

      - name: Print weekly review issue URL
        if: always()
        run: echo "weekly_review_issue_url=${{ steps.link_weekly_metrics.outputs.result }}"

      - name: Create investigate issue
        id: investigate_issue
        if: always() && steps.collect.outputs.collector_exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = process.env.GITHUB_RUN_ID;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            const { owner, repo } = context.repo;

            let summary = {};
            let weekStart = 'unknown';
            try {
              summary = JSON.parse(fs.readFileSync('runs/phase2-5-weekly/summary.json', 'utf8'));
              weekStart = summary.week_start || weekStart;
            } catch (error) {
              core.warning(`Failed to parse summary.json: ${error.message}`);
            }

            const title = `[Phase2.5][Investigate] weekly metrics alert (${weekStart}) run ${runId}`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            if (existing.data.total_count > 0) {
              core.info(`Existing investigate issue found: ${existing.data.items[0].html_url}`);
              return existing.data.items[0].html_url;
            }

            const body = [
              'Phase2.5 weekly metrics detected investigate decision.',
              '',
              `- week_start: ${summary.week_start ?? 'unknown'}`,
              `- run_id: ${summary.run_id ?? runId}`,
              `- run_url: ${summary.run_url ?? runUrl}`,
              `- onboarding_time_minutes: ${summary.onboarding_time_minutes ?? 'n/a'}`,
              `- weekly_ops_time_minutes: ${summary.weekly_ops_time_minutes ?? 'n/a'}`,
              `- failure_action_coverage_rate: ${summary.failure_action_coverage_rate ?? 'n/a'}`,
              `- gate_exception_count: ${summary.gate_exception_count ?? 'n/a'}`,
              `- overdue_exceptions_count: ${summary.overdue_exceptions_count ?? 'n/a'}`,
              '',
              '## Standard Response Checklist',
              '- [ ] T+0: owner / due date / impact scope recorded',
              '- [ ] T+1d: root_cause_hypothesis documented',
              '- [ ] T+3d: permanent_fix applied and rerun evidence attached',
              '- [ ] T+5d: close criteria evaluated',
              '',
              'Reference: docs/ops/phase2-5-investigate-response-flow.md',
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
            core.info(`Created investigate issue: ${created.data.html_url}`);
            return created.data.html_url;

      - name: Print investigate issue URL
        if: always() && steps.collect.outputs.collector_exit_code != '0'
        run: echo "investigate_issue_url=${{ steps.investigate_issue.outputs.result }}"

      - name: Upload phase2.5 weekly metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-5-weekly-metrics
          path: runs/phase2-5-weekly/

      - name: Fail workflow on investigate decision
        if: always() && steps.collect.outputs.collector_exit_code != '0'
        run: |
          echo "Phase2.5 metrics decision is investigate. See summary artifact, register PR, and investigate issue."
          exit 1