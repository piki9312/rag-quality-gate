name: Phase2.5 Weekly Hardening Metrics

on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:
    inputs:
      week_start_override:
        description: "Optional week_start override (YYYY-MM-DD) for backfill runs"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  phase2-5-weekly-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Collect phase2.5 metrics
        id: collect
        continue-on-error: true
        run: |
          set +e
          extra_args=()
          if [ -n "${{ github.event.inputs.week_start_override }}" ]; then
            extra_args+=(--week-start "${{ github.event.inputs.week_start_override }}")
          fi
          python -m rqg.demo.phase2_5_weekly_metrics \
            --output runs/phase2-5-weekly/summary.json \
            --append-register \
            --reviewer "${GITHUB_ACTOR}" \
            "${extra_args[@]}"
          collector_exit_code=$?
          set -e
          echo "collector_exit_code=${collector_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Evaluate provisional exit gate (C1-C4)
        id: exit_gate
        continue-on-error: true
        run: |
          set +e
          python -m rqg.demo.phase2_5_exit_gate_check \
            --required-weeks 4 \
            --coverage-threshold 1.0 \
            --summary-output runs/phase2-5-exit-gate/summary.json
          exit_gate_exit_code=$?
          set -e
          echo "exit_gate_exit_code=${exit_gate_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Evaluate residual risk closure controls (RC1-RC2)
        id: risk_closure
        continue-on-error: true
        run: |
          set +e
          python -m rqg.demo.phase2_5_risk_closure_check \
            --lookback-days 31 \
            --summary-output runs/phase2-5-risk-closure/summary.json
          risk_closure_exit_code=$?
          set -e
          echo "risk_closure_exit_code=${risk_closure_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Detect register changes
        id: register_diff
        run: |
          if git diff --quiet -- docs/ops/phase2-5-weekly-metrics-register.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request for weekly register update
        id: register_pr
        if: steps.register_diff.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update phase2.5 weekly metrics register (run ${{ github.run_id }})"
          branch: automation/phase2-5-weekly-metrics-${{ github.run_id }}
          delete-branch: true
          title: "Phase2.5 weekly metrics update (run ${{ github.run_id }})"
          body: |
            Auto-generated update from Phase2.5 Weekly Hardening Metrics workflow.

            - run_id: ${{ github.run_id }}
            - run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - source summary: runs/phase2-5-weekly/summary.json

            This PR updates the weekly register with one row for this run.
          labels: |
            documentation
            automation
          add-paths: |
            docs/ops/phase2-5-weekly-metrics-register.md

      - name: No register update detected
        if: steps.register_diff.outputs.changed != 'true'
        run: echo "No register changes detected. Skipping PR creation."

      - name: Resolve register PR reference
        id: register_pr_ref
        if: always()
        run: |
          if [ "${{ steps.register_diff.outputs.changed }}" != "true" ]; then
            echo "register_pr_url=" >> "$GITHUB_OUTPUT"
            echo "register_pr_note=no register diff" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.register_pr.outcome }}" = "success" ] && [ -n "${{ steps.register_pr.outputs.pull-request-url }}" ]; then
            echo "register_pr_url=${{ steps.register_pr.outputs.pull-request-url }}" >> "$GITHUB_OUTPUT"
            echo "register_pr_note=auto-created" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "register_pr_url=${{ github.server_url }}/${{ github.repository }}/pull/new/automation/phase2-5-weekly-metrics-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "register_pr_note=manual creation required (actions PR creation disabled)" >> "$GITHUB_OUTPUT"

      - name: Warn manual register PR creation required
        if: always() && steps.register_diff.outputs.changed == 'true' && steps.register_pr.outcome != 'success'
        run: |
          echo "Auto PR creation was blocked by repository settings."
          echo "Create PR manually from branch: automation/phase2-5-weekly-metrics-${{ github.run_id }}"
          echo "Manual PR URL: ${{ steps.register_pr_ref.outputs.register_pr_url }}"

      - name: Link weekly metrics run to weekly review issue
        id: link_weekly_metrics
        if: always()
        uses: actions/github-script@v7
        env:
          REGISTER_PR_URL: ${{ steps.register_pr_ref.outputs.register_pr_url }}
          REGISTER_PR_NOTE: ${{ steps.register_pr_ref.outputs.register_pr_note }}
          EXIT_GATE_EXIT_CODE: ${{ steps.exit_gate.outputs.exit_gate_exit_code }}
          RISK_CLOSURE_EXIT_CODE: ${{ steps.risk_closure.outputs.risk_closure_exit_code }}
        with:
          script: |
            const fs = require('fs');
            const runId = process.env.GITHUB_RUN_ID;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            const registerPrUrl = process.env.REGISTER_PR_URL || '';
            const registerPrNote = process.env.REGISTER_PR_NOTE || '';
            const exitGateExitCode = process.env.EXIT_GATE_EXIT_CODE || '';
            const riskClosureExitCode = process.env.RISK_CLOSURE_EXIT_CODE || '';
            const { owner, repo } = context.repo;

            let summary = {};
            let weekStart = 'unknown';
            try {
              summary = JSON.parse(fs.readFileSync('runs/phase2-5-weekly/summary.json', 'utf8'));
              weekStart = summary.week_start || weekStart;
            } catch (error) {
              core.warning(`Failed to parse summary.json: ${error.message}`);
            }

            const nextActions = Array.isArray(summary.next_actions) ? summary.next_actions : [];
            const nonTechnicalSummary = Array.isArray(summary.non_technical_summary)
              ? summary.non_technical_summary
              : [];
            const nextActionLines = nextActions.length > 0
              ? nextActions.slice(0, 10).map((action, index) => {
                  const category = action.failure_category || 'unknown';
                  const recommendedAction = action.recommended_action || 'Define next action in weekly review issue';
                  const owner = action.owner || 'T.B.D.';
                  const dueDate = action.due_date || 'T.B.D.';
                  const status = action.status || 'open';
                  return `- [${index + 1}] ${category}: ${recommendedAction} (owner: ${owner}, due: ${dueDate}, status: ${status})`;
                })
              : ['- none'];
            const nonTechnicalLines = nonTechnicalSummary.length > 0
              ? nonTechnicalSummary.slice(0, 8).map((line) => `- ${line}`)
              : ['- summary unavailable'];

            let exitGateSummary = {};
            try {
              exitGateSummary = JSON.parse(fs.readFileSync('runs/phase2-5-exit-gate/summary.json', 'utf8'));
            } catch (error) {
              core.warning(`Failed to parse exit gate summary: ${error.message}`);
            }

            let riskClosureSummary = {};
            try {
              riskClosureSummary = JSON.parse(fs.readFileSync('runs/phase2-5-risk-closure/summary.json', 'utf8'));
            } catch (error) {
              core.warning(`Failed to parse risk closure summary: ${error.message}`);
            }

            const gateWeekStarts = Array.isArray(exitGateSummary.evaluated_week_starts)
              ? exitGateSummary.evaluated_week_starts.join(', ')
              : 'n/a';
            const gateNotes = Array.isArray(exitGateSummary.notes) && exitGateSummary.notes.length > 0
              ? exitGateSummary.notes.join(' | ')
              : 'none';
            const riskClosureNotes = Array.isArray(riskClosureSummary.notes) && riskClosureSummary.notes.length > 0
              ? riskClosureSummary.notes.join(' | ')
              : 'none';

            const weeklyTitle = `[Phase2.5][Weekly Review] ${weekStart}`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title "${weeklyTitle}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });

            if (existing.data.total_count === 0) {
              core.warning(`Weekly review issue not found for ${weekStart}. Skipping link comment.`);
              return '';
            }

            const issue = existing.data.items[0];
            const body = [
              'Phase2.5 weekly metrics run linked from automation.',
              '',
              `- week_start: ${summary.week_start ?? weekStart}`,
              `- run_id: ${summary.run_id ?? runId}`,
              `- run_url: ${summary.run_url ?? runUrl}`,
              `- decision: ${summary.decision ?? 'unknown'}`,
              `- register_pr: ${registerPrUrl || 'not created (no register diff)'}`,
              `- register_pr_note: ${registerPrNote || 'n/a'}`,
              '',
              '## Next Actions (auto)',
              ...nextActionLines,
              '',
              '## Non-Technical Weekly Summary',
              ...nonTechnicalLines,
              '',
              '## Provisional Exit Gate (C1-C4)',
              `- exit_gate_exit_code: ${exitGateExitCode || 'n/a'}`,
              `- c1_four_week_evidence_continuity: ${exitGateSummary.c1_four_week_evidence_continuity ?? 'n/a'}`,
              `- c2_overdue_exceptions_zero: ${exitGateSummary.c2_overdue_exceptions_zero ?? 'n/a'}`,
              `- c3_stale_timestamp_risk_resolved: ${exitGateSummary.c3_stale_timestamp_risk_resolved ?? 'n/a'}`,
              `- c4_failure_action_coverage_threshold: ${exitGateSummary.c4_failure_action_coverage_threshold ?? 'n/a'}`,
              `- overall_pass: ${exitGateSummary.overall_pass ?? 'n/a'}`,
              `- evaluated_week_starts: ${gateWeekStarts}`,
              `- exit_gate_notes: ${gateNotes}`,
              '',
              '## Residual Risk Closure (RC1-RC2)',
              `- risk_closure_exit_code: ${riskClosureExitCode || 'n/a'}`,
              `- rc1_customer_track_recent: ${riskClosureSummary.rc1_customer_track_recent ?? 'n/a'}`,
              `- rc1_latest_customer_measurement_date: ${riskClosureSummary.rc1_latest_customer_measurement_date ?? 'n/a'}`,
              `- rc2_synthetic_regression_recent: ${riskClosureSummary.rc2_synthetic_regression_recent ?? 'n/a'}`,
              `- rc2_latest_synthetic_regression_date: ${riskClosureSummary.rc2_latest_synthetic_regression_date ?? 'n/a'}`,
              `- residual_risk_overall_pass: ${riskClosureSummary.overall_pass ?? 'n/a'}`,
              `- residual_risk_notes: ${riskClosureNotes}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });

            core.info(`Posted weekly metrics link comment to ${issue.html_url}`);
            return issue.html_url;

      - name: Print weekly review issue URL
        if: always()
        run: echo "weekly_review_issue_url=${{ steps.link_weekly_metrics.outputs.result }}"

      - name: Create investigate issue
        id: investigate_issue
        if: always() && (steps.collect.outputs.collector_exit_code != '0' || steps.risk_closure.outputs.risk_closure_exit_code != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = process.env.GITHUB_RUN_ID;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
            const { owner, repo } = context.repo;

            let summary = {};
            let weekStart = 'unknown';
            try {
              summary = JSON.parse(fs.readFileSync('runs/phase2-5-weekly/summary.json', 'utf8'));
              weekStart = summary.week_start || weekStart;
            } catch (error) {
              core.warning(`Failed to parse summary.json: ${error.message}`);
            }

            let riskClosureSummary = {};
            try {
              riskClosureSummary = JSON.parse(fs.readFileSync('runs/phase2-5-risk-closure/summary.json', 'utf8'));
            } catch (error) {
              core.warning(`Failed to parse risk closure summary: ${error.message}`);
            }

            const title = `[Phase2.5][Investigate] weekly metrics alert (${weekStart}) run ${runId}`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            if (existing.data.total_count > 0) {
              core.info(`Existing investigate issue found: ${existing.data.items[0].html_url}`);
              return existing.data.items[0].html_url;
            }

            const body = [
              'Phase2.5 weekly metrics detected investigate decision.',
              '',
              `- week_start: ${summary.week_start ?? 'unknown'}`,
              `- run_id: ${summary.run_id ?? runId}`,
              `- run_url: ${summary.run_url ?? runUrl}`,
              `- onboarding_time_minutes: ${summary.onboarding_time_minutes ?? 'n/a'}`,
              `- weekly_ops_time_minutes: ${summary.weekly_ops_time_minutes ?? 'n/a'}`,
              `- failure_action_coverage_rate: ${summary.failure_action_coverage_rate ?? 'n/a'}`,
              `- gate_exception_count: ${summary.gate_exception_count ?? 'n/a'}`,
              `- overdue_exceptions_count: ${summary.overdue_exceptions_count ?? 'n/a'}`,
              `- rc1_customer_track_recent: ${riskClosureSummary.rc1_customer_track_recent ?? 'n/a'}`,
              `- rc2_synthetic_regression_recent: ${riskClosureSummary.rc2_synthetic_regression_recent ?? 'n/a'}`,
              `- residual_risk_overall_pass: ${riskClosureSummary.overall_pass ?? 'n/a'}`,
              '',
              '## Standard Response Checklist',
              '- [ ] T+0: owner / due date / impact scope recorded',
              '- [ ] T+1d: root_cause_hypothesis documented',
              '- [ ] T+3d: permanent_fix applied and rerun evidence attached',
              '- [ ] T+5d: close criteria evaluated',
              '',
              'Reference: docs/ops/phase2-5-investigate-response-flow.md',
            ].join('\n');

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
            core.info(`Created investigate issue: ${created.data.html_url}`);
            return created.data.html_url;

      - name: Print investigate issue URL
        if: always() && (steps.collect.outputs.collector_exit_code != '0' || steps.risk_closure.outputs.risk_closure_exit_code != '0')
        run: echo "investigate_issue_url=${{ steps.investigate_issue.outputs.result }}"

      - name: Upload phase2.5 weekly metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-5-weekly-metrics
          path: |
            runs/phase2-5-weekly/
            runs/phase2-5-exit-gate/
            runs/phase2-5-risk-closure/

      - name: Fail workflow on investigate decision or residual risk control miss
        if: always() && (steps.collect.outputs.collector_exit_code != '0' || steps.risk_closure.outputs.risk_closure_exit_code != '0')
        run: |
          echo "Phase2.5 metrics decision or residual risk closure control failed. See summary artifact, register PR, and investigate issue."
          exit 1