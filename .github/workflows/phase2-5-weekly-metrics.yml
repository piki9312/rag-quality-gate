name: Phase2.5 Weekly Hardening Metrics

on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:

jobs:
  phase2-5-weekly-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Collect phase2.5 metrics
        run: |
          python -m rqg.demo.phase2_5_weekly_metrics --output runs/phase2-5-weekly/summary.json

      - name: Upload phase2.5 weekly metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-5-weekly-metrics
          path: runs/phase2-5-weekly/