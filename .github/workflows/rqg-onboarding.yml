name: RQG Onboarding Smoke

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Onboarding profile (demo_cycle|hr|wiki)"
        required: false
        default: demo_cycle
        type: choice
        options:
          - demo_cycle
          - hr
          - wiki
  pull_request:

jobs:
  onboarding-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run onboarding quickstart flow
        id: run_onboarding
        shell: bash
        run: |
          profile="demo_cycle"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.profile }}" ]; then
            profile="${{ github.event.inputs.profile }}"
          fi

          python -m rqg.demo.onboarding_quickstart --profile "$profile"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Verify onboarding summary
        shell: python
        env:
          EXPECTED_PROFILE: ${{ steps.run_onboarding.outputs.profile }}
        run: |
          import os
          import json
          from pathlib import Path

          summaries = sorted(Path("demo_runs/onboarding_quickstart").glob("*/summary.json"))
          if not summaries:
            raise SystemExit("No onboarding summary found")

          summary = json.loads(summaries[-1].read_text(encoding="utf-8"))
          expected_profile = (os.environ.get("EXPECTED_PROFILE") or "demo_cycle").strip()
          if summary.get("profile") != expected_profile:
            raise SystemExit(
              f"Unexpected profile: {summary.get('profile')} (expected: {expected_profile})"
            )
          if summary.get("gate_status") != "pass":
            raise SystemExit(f"Unexpected gate_status: {summary.get('gate_status')}")
          if int(summary.get("changed_evidence_count", 0)) < 1:
            raise SystemExit("changed_evidence_count must be >= 1")
          if int(summary.get("impacted_case_count", 0)) < 1:
            raise SystemExit("impacted_case_count must be >= 1")

          print("onboarding smoke passed")
