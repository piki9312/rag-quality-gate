name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (black --check)
        run: black --check src/ tests/

      - name: Lint (isort --check)
        run: isort --check-only src/ tests/

      - name: Test with coverage
        run: |
          pytest tests/ -v --cov=rqg --cov-report=term-missing --cov-fail-under=69

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage

  quality-gate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quality eval
        run: |
          rqg eval packs/hr/cases.csv \
            --docs packs/hr/documents/ \
            --log-dir runs/quality \
            --mock || true

      - name: Run quality gate
        run: |
          rqg check \
            --log-dir runs/quality \
            --s1-threshold 0 \
            --overall-threshold 0 \
            --output-file runs/quality/gate-report.md \
            --decision-file runs/quality/gate-decision.json

      - name: Verify legacy match migration baseline
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          workspace = Path("runs/legacy-migration-check")
          workspace.mkdir(parents=True, exist_ok=True)

          old_doc = workspace / "leave_policy_old.md"
          new_doc = workspace / "leave_policy_new.md"
          old_doc.write_text(
            "# Leave Policy\n\nPaid leave requests must be submitted 5 business days in advance.\n",
            encoding="utf-8",
          )
          new_doc.write_text(
            "# Leave Policy\n\nPaid leave requests must be submitted 3 business days in advance.\n",
            encoding="utf-8",
          )

          old_snapshot = workspace / "old_snapshot.json"
          new_snapshot = workspace / "new_snapshot.json"
          cases_legacy = workspace / "cases_legacy.json"
          cases_migrated = workspace / "cases_migrated.json"
          migration_report = workspace / "migration_report.json"
          impact_report = workspace / "impact_report.json"

          old_snapshot.write_text(
            json.dumps(
              {
                "snapshot_id": "impact-old",
                "doc_id": "demo-leave-policy",
                "title": "Leave Policy",
                "source_path": str(old_doc.resolve()),
                "content_hash": "hash-old",
                "created_at": "2026-03-27T00:00:00Z",
                "metadata": {},
              },
              indent=2,
            ),
            encoding="utf-8",
          )
          new_snapshot.write_text(
            json.dumps(
              {
                "snapshot_id": "impact-new",
                "doc_id": "demo-leave-policy",
                "title": "Leave Policy",
                "source_path": str(new_doc.resolve()),
                "content_hash": "hash-new",
                "created_at": "2026-03-27T00:00:00Z",
                "metadata": {},
              },
              indent=2,
            ),
            encoding="utf-8",
          )
          cases_legacy.write_text(
            json.dumps(
              [
                {
                  "case_id": "leave_policy_001",
                  "question": "What is the leave policy?",
                  "expected_evidence": [f"{old_doc.resolve().as_posix()}#sec-1"],
                  "expected_keywords": ["leave", "policy"],
                  "risk_level": "S2",
                  "doc_snapshot_id": "impact-old",
                }
              ],
              indent=2,
            ),
            encoding="utf-8",
          )

          subprocess.run(
            [
              sys.executable,
              "-m",
              "rqg.cli",
              "migrate-cases",
              "--cases",
              str(cases_legacy),
              "--snapshot",
              str(old_snapshot),
              "--snapshot",
              str(new_snapshot),
              "--output",
              str(cases_migrated),
              "--report",
              str(migration_report),
            ],
            check=True,
          )

          subprocess.run(
            [
              sys.executable,
              "-m",
              "rqg.cli",
              "impact",
              "--old-snapshot",
              str(old_snapshot),
              "--new-snapshot",
              str(new_snapshot),
              "--cases",
              str(cases_migrated),
              "--output",
              str(impact_report),
            ],
            check=True,
          )

          payload = json.loads(impact_report.read_text(encoding="utf-8"))
          impacted = len(payload.get("impacted_case_ids", []))

          if impacted == 0:
            raise SystemExit("legacy migration CI check failed: expected impacted cases > 0")

          print(f"legacy migration CI check passed: impacted={impacted}")
          PY

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-artifacts
          path: |
            runs/quality/
            index/snapshots/

  phase2-5-exit-gate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check provisional exit decision C1-C4
        run: |
          python -m rqg.demo.phase2_5_exit_gate_check \
            --required-weeks 4 \
            --coverage-threshold 1.0 \
            --summary-output runs/phase2-5-exit-gate/summary.json

      - name: Upload Phase2.5 exit gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-5-exit-gate
          path: runs/phase2-5-exit-gate/

  phase2-5-risk-closure:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check residual risk closure controls RC1-RC2
        run: |
          python -m rqg.demo.phase2_5_risk_closure_check \
            --lookback-days 31 \
            --summary-output runs/phase2-5-risk-closure/summary.json

      - name: Upload Phase2.5 risk closure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-5-risk-closure
          path: runs/phase2-5-risk-closure/

  internal-docs-pack-contract:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate internal-docs vertical pack contracts
        run: |
          python - <<'PY'
          import csv
          import re
          from pathlib import Path

          required_files = [
            Path("docs/ops/phase3-internal-docs-vertical-pack.md"),
            Path("templates/sample_pack/cases.csv"),
            Path("templates/sample_pack/gate.yml"),
            Path("templates/sample_pack/quality-pack.yml"),
            Path("packs/hr/cases.csv"),
            Path("packs/hr/gate.yml"),
            Path("packs/hr/quality-pack.yml"),
            Path("packs/hr/README.md"),
            Path("packs/wiki/cases.csv"),
            Path("packs/wiki/gate.yml"),
            Path("packs/wiki/quality-pack.yml"),
            Path("packs/wiki/README.md"),
          ]

          missing = [str(p) for p in required_files if not p.exists()]
          if missing:
            raise SystemExit(f"missing required internal-docs pack files: {missing}")

          required_case_columns = {
            "case_id",
            "severity",
            "question",
            "expected_keywords",
            "owner",
            "min_pass_rate",
            "last_reviewed_at",
          }

          def validate_cases(path: Path) -> None:
            with path.open("r", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              columns = set(reader.fieldnames or [])
              missing_cols = sorted(required_case_columns - columns)
              if missing_cols:
                raise SystemExit(f"{path} missing columns: {missing_cols}")

              rows = list(reader)
              if not rows:
                raise SystemExit(f"{path} must contain at least one row")

              severities = {str(row.get("severity", "")).strip().upper() for row in rows}
              if "S1" not in severities:
                raise SystemExit(f"{path} must contain at least one S1 case")
              if "S2" not in severities:
                raise SystemExit(f"{path} must contain at least one S2 case")

          for csv_path in [
            Path("templates/sample_pack/cases.csv"),
            Path("packs/hr/cases.csv"),
            Path("packs/wiki/cases.csv"),
          ]:
            validate_cases(csv_path)

          required_quality_keys = {"pack", "cases_file", "documents_dir", "kpis", "slo"}

          def validate_quality_pack(path: Path) -> None:
            text = path.read_text(encoding="utf-8")
            present_keys = set()
            for key in required_quality_keys:
              if re.search(rf"^\s*{re.escape(key)}\s*:", text, flags=re.MULTILINE):
                present_keys.add(key)

            missing_keys = sorted(required_quality_keys - present_keys)
            if missing_keys:
              raise SystemExit(f"{path} missing keys: {missing_keys}")

            if not re.search(r"^\s*pack\s*:\s*$", text, flags=re.MULTILINE):
              raise SystemExit(f"{path} missing pack block")
            if not re.search(r"^\s+name\s*:\s*.+$", text, flags=re.MULTILINE):
              raise SystemExit(f"{path} pack.name must be set")
            if not re.search(r"^\s+domain\s*:\s*.+$", text, flags=re.MULTILINE):
              raise SystemExit(f"{path} pack.domain must be set")

          for quality_path in [
            Path("templates/sample_pack/quality-pack.yml"),
            Path("packs/hr/quality-pack.yml"),
            Path("packs/wiki/quality-pack.yml"),
          ]:
            validate_quality_pack(quality_path)

          print("internal-docs vertical pack contract check passed")
          PY
